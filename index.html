<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practice</title>
</head>
<body>
    







    <script>
        var Age=50
        switch(Age){
            case (Age<=20):
                document.write("Age is lower or equal than 20")
                break
            case (Age<=30 && Age >20):
                document.write("Age is lower or equal than 30 and higher than 20")
                break
            case (Age=50):
                document.write("Age is 50")
                break
            default:
                document.write("Age is nothing") 
        }
    </script>
</body>
</html>
